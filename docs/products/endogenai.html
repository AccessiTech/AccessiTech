      <div aria-label="App Root" class="App container-fluid"><header class="main-header products" aria-label="Header"><a class="skip-link" href="#main">Skip to main content</a><a title="AccessiTech LLC" class="logo-link" href="/"><h1 class="logo-container" style="background-image:url(&#x27;/assets/images/TypeLogo_White_HC.svg&#x27;)">AccessiTech LLC</h1></a><nav class="header-nav" aria-label="Main navigation"><ul><li><a class="" href="/about">About</a></li><li class="nav-dropdown"><a class="" href="/services">Services</a><ul class="dropdown-menu" aria-label="Services menu"><li><a class="" href="/services/consulting">Consulting</a></li><li class="dropdown-sub-item"><a class="" href="/services/consulting/asaaps">ASaaPs</a></li><li class="dropdown-sub-item"><a class="" href="/services/consulting/ai-integration">AI Integration</a></li><li class="dropdown-sub-item"><a class="" href="/services/consulting/qa">QA</a></li><li><a class="" href="/services/mentorship">Mentorship</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/cccs">Courses &amp; Content</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/coaching">Coaching</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/openclassrooms">OpenClassrooms</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/sotc">SOTC</a></li></ul></li><li class="nav-dropdown"><a class="active" href="/products">Products</a><ul class="dropdown-menu" aria-label="Products menu"><li class="dropdown-sub-item"><a class="" href="/products/wcag-series">WCAG Series</a></li><li class="dropdown-sub-item"><a class="active" href="/products/endogenai">EndogenAI</a></li><li class="dropdown-sub-item"><a class="" href="/products/oss-asaaps">OSS &amp; ASaaPs</a></li><li class="dropdown-sub-item"><a class="" href="/products/cccs">Curriculum &amp; Content</a></li></ul></li><li><a class="" href="/wcag">Learn</a></li><li><a class="" href="/blog">Blog</a></li><li><a class="" href="/contact">Contact</a></li></ul></nav><div class="a11y-container" aria-label="Accessibility Options"><div class="a11y__settings-container"><button class="a11y__settings-toggle" aria-label="Toggle Accessibility Options"><i class="fa fa-cog"></i></button></div></div></header><div class="breadcrumb-row endogenai-page row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><nav aria-label="breadcrumb" class="breadcrumb-container"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/">Home</a></li><li class="breadcrumb-item"><a href="/products">Products</a></li><li class="breadcrumb-item active" aria-current="page">EndogenAI</li></ol></nav></div></div><div class="content-row endogenai-page hero-row pb-2 row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-hero mb-5 mt-2"><h1 class="mb-3">EndogenAI</h1><div class="hero-tagline"><p>The accountability gap is growing...AI systems are built without genuine consideration for the people who depend on them. <strong>EndogenAI fixes that</strong> — an open-source methodology for embedding governance into every layer of your AI workflows.</p></div></section></div></div><div class="content-row endogenai-page mt-5 row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-problem text-start mb-5"><h2 class="mb-4">The Problem</h2><p>Recent governance reports expose the same structural risks: AI systems launched without accountability mechanisms, platform dependencies that trap organizations, and decision-making processes that exclude the people most affected. A less visible risk runs underneath all of them: most AI teams don&#x27;t realize their agent harness — the scaffolding between their LLM and their tools, data, and memory — is the stickiest lock-in vector of all. Here&#x27;s what the research shows:</p><div class="problem-cards mt-5 row"><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">UK CMA: AI Agent Autonomy Failures</div><div class="card-short-body flex-grow-1"><p>The UK CMA&#x27;s 2026 watchdog report documents systematic AI agent failures: manipulation, unintended escalation, and loss of human oversight. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/ai-autonomy-governance.md#" target="_blank" rel="noopener noreferrer">See the full analysis</a> — these aren&#x27;t theoretical risks.</p></div><button type="button" aria-label="Learn more about UK CMA: AI Agent Autonomy Failures" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">Platform Lock-In: Vendor Volatility</div><div class="card-short-body flex-grow-1"><p>Meta&#x27;s acquisition of Moltbook shows how organizations can lose operational control overnight when vendor policies shift without warning. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/ai-platform-lock-in-risks.md#" target="_blank" rel="noopener noreferrer">Platform lock-in research</a> documents the repeating pattern.</p></div><button type="button" aria-label="Learn more about Platform Lock-In: Vendor Volatility" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">OWASP LLM Top 10: Security Blindness</div><div class="card-short-body flex-grow-1"><p>Seven of the OWASP LLM Top 10 apply to agentic workflows — three at High severity. Most organizations don&#x27;t know they&#x27;re exposed. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/owasp-llm-threat-model.md#" target="_blank" rel="noopener noreferrer">Full threat model analysis</a> — governance closes these gaps.</p></div><button type="button" aria-label="Learn more about OWASP LLM Top 10: Security Blindness" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">Harness Lock-In: Memory Loss</div><div class="card-short-body flex-grow-1"><p>Deleting a proprietary AI agent loses months of learned preferences — permanently. Harnesses like Claude Managed Agents store memory server-side with no export path. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/harness-memory-governance.md" target="_blank" rel="noopener noreferrer">Full analysis</a> — memory lock-in is not recoverable.</p></div><button type="button" aria-label="Learn more about Harness Lock-In: Memory Loss" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div></div></section><section class="endogenai-what text-start mb-5"><h2 class="mb-4">What EndogenAI is</h2><div class="brand-relationship mb-4"><p>AccessiTech built EndogenAI as the governance layer for organizations closing the accountability gap with AI systems. The methodology emerges from three years of accessibility-first consulting work: seeing how systems fail when they&#x27;re built without genuine consideration for the people who depend on them, and discovering that the same structural blindness appears in AI governance. Disability justice principles — centering the expertise of disabled people in redesign — are directly applicable to AI accountability. The people most excluded from a system are the people best positioned to fix it. That insight is the foundation of EndogenAI. We use it in every consulting engagement, and we&#x27;re open-sourcing it so organizations can apply the same methodology independently.</p></div><div class="what-subsections row"><div class="mb-4 col-md-6 col-12"><h3>Three Core Axioms</h3><ul>
<li><strong><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#1-endogenous-first" target="_blank" rel="noopener noreferrer">Endogenous-First</a></strong> — read your system&#x27;s own encoded knowledge before acting</li>
<li><strong><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#2-algorithms-before-tokens" target="_blank" rel="noopener noreferrer">Algorithms Before Tokens</a></strong> — prefer deterministic, scripted solutions over interactive generation</li>
<li><strong><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#3-local-compute-first" target="_blank" rel="noopener noreferrer">Local Compute-First</a></strong> — run enforcement locally, at the commit boundary, not delegated to cloud CI</li>
</ul>
<p>Every layer of the governance stack implements these three principles.</p></div><div class="mb-4 col-md-6 col-12"><h3>The Open-Source Model</h3><p>This is the same model Red Hat used to open-source enterprise infrastructure: free methodology, paid implementation support. You own every file, audit every layer, and build organizational capabilities that don&#x27;t depend on any vendor. <a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#" target="_blank" rel="noopener noreferrer">Read the full Endogenic Development Manifesto</a> — the constitutional foundation for everything EndogenAI does. AccessiTech offers implementation consulting for organizations that want hands-on help embedding the stack.</p></div></div></section><section class="endogenai-products text-start"><h2 class="mb-4">What is dogma &amp; DogmaMCP?</h2><div class="mb-4"><p><strong>dogma</strong> is the governance substrate you own and version-control; <strong>DogmaMCP</strong> makes that substrate programmatically accessible to AI agents via the Model Context Protocol; <strong>EndogenAI</strong> is the consulting methodology for embedding both into your organization&#x27;s workflows.</p></div><div class="products-cards mb-5 mt-5 row"><div class="col-md-6 col-12"><h3>dogma</h3><div class="card-short-body flex-grow-1"><p>The governance corpus you fork and extend: MANIFESTO.md axioms, agent roles, scripts, research synthesis. Every organization using EndogenAI <a href="https://github.com/EndogenAI/dogma" target="_blank" rel="noopener noreferrer">reads from dogma</a> and adapts it for their context — governance lives in your git repository, not vendor dashboards.</p></div><button type="button" aria-label="Learn more about dogma" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div><div class="col-md-6 col-12"><h3>DogmaMCP</h3><div class="card-short-body flex-grow-1"><p>MCP server exposing dogma tools to AI agents: validators for agent files, scratchpad state checks, scaffolding templates. Runs locally, integrates with VS Code Copilot and Claude Desktop, enforces <a href="https://github.com/EndogenAI/dogma/tree/main/mcp_server" target="_blank" rel="noopener noreferrer">governance programmatically</a>. It&#x27;s the bridge between encoded substrate and AI workflow.</p></div><button type="button" aria-label="Learn more about DogmaMCP" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div><h3>The Governance Stack</h3><p>EndogenAI governance is encoded as a five-layer stack — each layer a concrete artifact you own, audit, and extend.</p><div class="governance-stack-cards mb-5 row"><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#the-three-core-axioms" target="_blank" rel="noopener noreferrer">MANIFESTO.md</a></h4><p class="mb-0">Your organization&#x27;s foundational values and operational constraints — the constitutional layer every other artifact inherits from.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#guiding-constraints" target="_blank" rel="noopener noreferrer">AGENTS.md</a></h4><p class="mb-0">Agent fleet conventions, decision gates, commit discipline, and phase sequences — principles translated into enforceable operational rules.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/.github/agents/README.md#agent-fleet-catalog" target="_blank" rel="noopener noreferrer">Agent Roles (.agent.md files)</a></h4><p class="mb-0">Specialized agents with explicit tool restrictions, defined posture, and handoff patterns — no agent gets a general-purpose toolkit.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/.github/skills/" target="_blank" rel="noopener noreferrer">Agent Skills (SKILL.md files)</a></h4><p class="mb-0">Domain-specific workflows packaged so any agent can invoke them — the &quot;how to&quot; layer for procedures used by more than one role.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/scripts/README.md#directory-layout" target="_blank" rel="noopener noreferrer">Governance Scripts</a></h4><p class="mb-0">Deterministic validation, linting, and enforcement that run at every commit and push boundary — scripted governance is auditable and repeatable.</p></div></div></div></div></section></div></div><div class="how-it-works-row row"><div class="pt-5 pb-3 col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-how text-start mb-5"><h2 class="mb-4 text-center text-dark fw-bold">How All It Works</h2><div class="encoding-cards row"><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">1<!-- -->.</span> <!-- -->Foundational Axioms (MANIFESTO.md)</h3><div class="card-short-body flex-grow-1"><p>Your organization&#x27;s foundational values and axioms define what kind of system you are. EndogenAI uses three: Endogenous-First, Algorithms-Before-Tokens, Local-Compute-First. <a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#the-three-core-axioms" target="_blank" rel="noopener noreferrer">Read the full MANIFESTO</a> — these axioms govern every layer below.</p></div><button type="button" aria-label="Learn more about Foundational Axioms (MANIFESTO.md)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">2<!-- -->.</span> <!-- -->Operational Constraints (AGENTS.md)</h3><div class="card-short-body flex-grow-1"><p>Translate high-level axioms into operational rules the entire agent fleet follows: session gates, commit discipline, file-write guardrails, phase sequences. <a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#guiding-constraints" target="_blank" rel="noopener noreferrer">AGENTS.md</a> is where principles meet practice — the constitutional enforcement layer.</p></div><button type="button" aria-label="Learn more about Operational Constraints (AGENTS.md)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">3<!-- -->.</span> <!-- -->Agent Roles (.agent.md files)</h3><div class="card-short-body flex-grow-1"><p>Specialized agents with minimal, role-specific tool sets. Each has explicit posture (readonly, creator, full), handoff patterns, and endogenous sources. No general-purpose toolkits. <a href="https://github.com/EndogenAI/dogma/blob/main/.github/agents/README.md" target="_blank" rel="noopener noreferrer">Agent fleet catalog</a> shows how role definitions instantiate MANIFESTO axioms.</p></div><button type="button" aria-label="Learn more about Agent Roles (.agent.md files)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">4<!-- -->.</span> <!-- -->Reusable Skills (SKILL.md files)</h3><div class="card-short-body flex-grow-1"><p>Package domain-specific workflows so multiple agents can invoke them. When a procedure is used twice, the third time becomes a skill. <a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#agent-skills" target="_blank" rel="noopener noreferrer">Skills library</a> is the &quot;how to&quot; layer — decision gates, validation checklists, repeatable techniques.</p></div><button type="button" aria-label="Learn more about Reusable Skills (SKILL.md files)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">5<!-- -->.</span> <!-- -->Deterministic Governance (Scripts)</h3><div class="card-short-body flex-grow-1"><p>Deterministic validation and enforcement encoded as scripts that run on every commit (pre-commit hooks), push (pre-push tests), and in CI. <a href="https://github.com/EndogenAI/dogma/blob/main/scripts/README.md" target="_blank" rel="noopener noreferrer">Scripts catalog</a> — scripted governance is auditable, repeatable, and more reliable than manual review gates.</p></div><button type="button" aria-label="Learn more about Deterministic Governance (Scripts)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">6<!-- -->.</span> <!-- -->Lossless Content Space (CScratchpad)</h3><div class="card-short-body flex-grow-1"><p>Persistent, structured storage that retains session state, governance context, and agent findings across all AI conversation boundaries. When context windows compact, governance context survives. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/guides/session-management.md#scratchpad-governance" target="_blank" rel="noopener noreferrer">Session governance protocol</a> makes organizational memory durable beyond token limits.</p></div><button type="button" aria-label="Learn more about Lossless Content Space (CScratchpad)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">7<!-- -->.</span> <!-- -->Runtime Validation &amp; Monitoring</h3><div class="card-short-body flex-grow-1"><p>Pre-commit hooks and CI gates enforce all upstream constraints at every boundary. Commit violates AGENTS.md? Pre-commit rejects before push. CI finds violations? PR cannot merge. <a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#guardrails" target="_blank" rel="noopener noreferrer">Guardrails reference</a> — governance is checked continuously, not retrospectively.</p></div><button type="button" aria-label="Learn more about Runtime Validation &amp; Monitoring" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div></div></section></div></div><div class="research-section row"><div class="text-start col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-research py-5"><h2 class="mb-4 text-center">What the Research Says</h2><div class="mb-5 research-intro"><p>The methodology is only as strong as its empirical foundation. This section documents the external validation and internal research that grounds every EndogenAI design choice. External validation comes from government watchdogs (UK CMA), security standards (OWASP), and open-source infrastructure leaders (LangChain, Anthropic MCP adoption) — authorities that independently confirm the structural risks EndogenAI mitigates. Internal research documents the patterns, failure modes, and architectural insights we discovered building the methodology. Together, these sources prove EndogenAI is not aspirational governance — it is tested, validated, and grounded in both industry practice and independent oversight.</p></div><div class="research-external"><h3 class="mb-3 mt-5">What External Authorities Say</h3><div class="research-cards mt-3 row"><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">LangChain: Your Harness, Your Memory</h4><div class="card-short-body flex-grow-1"><p>Harness infrastructure is permanent — memory is the most durable lock-in vector. Organizations that don&#x27;t own their harness <a href="https://www.langchain.com/blog/your-harness-your-memory" target="_blank" rel="noopener noreferrer">cede accumulated behavioral context</a> to the vendor, with no path to reconstruct it. Memory lives with your harness.</p></div><button type="button" aria-label="Learn more about LangChain: Your Harness, Your Memory" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Datadog: Harness-First Agents</h4><div class="card-short-body flex-grow-1"><p>Treating the harness as primary infrastructure — not a convenience layer — is the precondition for <a href="https://www.datadoghq.com/blog/ai/harness-first-agents/" target="_blank" rel="noopener noreferrer">reliable, auditable agentic systems</a> at production scale. Memory, tool routing, and access control belong in the harness, not bolted on afterward.</p></div><button type="button" aria-label="Learn more about Datadog: Harness-First Agents" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">OWASP LLM Top 10</h4><div class="card-short-body flex-grow-1"><p>Seven of ten highest-severity LLM risks apply directly to agentic workflows. Harness-level governance — not application patching — is the <a href="https://owasp.org/www-project-top-10-for-large-language-model-applications/" target="_blank" rel="noopener noreferrer">appropriate mitigation layer</a> for all seven. Prompt injection, excessive agency, and information leakage require architectural defense.</p></div><button type="button" aria-label="Learn more about OWASP LLM Top 10" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Anthropic MCP Standard Adoption</h4><div class="card-short-body flex-grow-1"><p>MCP is rapidly becoming the cross-vendor standard for tool-calling across Claude Desktop, VS Code, Cursor, and third-party servers. <a href="https://www.anthropic.com/news/model-context-protocol" target="_blank" rel="noopener noreferrer">Open harness architecture</a> is the durable bet — validating governance-as-substrate rather than governance-as-wrapper.</p></div><button type="button" aria-label="Learn more about Anthropic MCP Standard Adoption" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">UK CMA AI Autonomy Report</h4><div class="card-short-body flex-grow-1"><p>Watchdog findings on agent autonomy failures validate EndogenAI&#x27;s Minimal-Posture principle: limit tool scope, require explicit phase gates, treat every escalation as <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/ai-autonomy-governance.md" target="_blank" rel="noopener noreferrer">a human decision boundary</a>. Autonomy without constraints produces manipulation and unintended escalation.</p></div><button type="button" aria-label="Learn more about UK CMA AI Autonomy Report" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">NIST AI Risk Management Framework (AI RMF 1.0)</h4><div class="card-short-body flex-grow-1"><p>NIST&#x27;s federal AI governance standard validates <a href="https://www.nist.gov/itl/ai-risk-management-framework" target="_blank" rel="noopener noreferrer">values-first architecture</a>: transparency, human oversight, and documented accountability must be structural, not aspirational. EndogenAI operationalizes all three as substrate layers.</p></div><button type="button" aria-label="Learn more about NIST AI Risk Management Framework (AI RMF 1.0)" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div></div></div><div class="research-internal mt-4"><h3 class="mb-3 mt-5">Our Research</h3><div class="research-cards mt-3 row"><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Endogenic Design Patterns for AI Systems</h4><div class="card-short-body flex-grow-1"><p>Biological scaffolding metaphors for AI governance. Organizations encoding knowledge persistently show <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/methodology/endogenic-design-paper.md" target="_blank" rel="noopener noreferrer">40–60% reduction in incident recovery time</a> compared to ad-hoc approaches — the substrate grows stronger with each session.</p></div><button type="button" aria-label="Learn more about Endogenic Design Patterns for AI Systems" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Values Encoding Fidelity and Agent Fleet Maturity</h4><div class="card-short-body flex-grow-1"><p>How to measure whether your governance actually works: cross-layer validation, encoding fidelity tests, L0–L3 maturity model. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/methodology/values-encoding.md" target="_blank" rel="noopener noreferrer">Values encoding research</a> defines the diagnostic framework — from tacit knowledge to organizational policy.</p></div><button type="button" aria-label="Learn more about Values Encoding Fidelity and Agent Fleet Maturity" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Bubble Clusters and Substrate Fragmentation</h4><div class="card-short-body flex-grow-1"><p>Why AI workflows built with disconnected agents fail at governance boundaries. Unified substrate and version control <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/neuroscience/bubble-clusters-substrate.md" target="_blank" rel="noopener noreferrer">prevent &quot;bubble&quot; formation</a> where agents silently violate constraints — fragmented state is the enemy of coherence.</p></div><button type="button" aria-label="Learn more about Bubble Clusters and Substrate Fragmentation" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">The Anchor: Memory as Harness Lock-In Infrastructure</h4><div class="card-short-body flex-grow-1"><p>Memory is the structural anchor for vendor lock-in — more durable than model switching because it embeds <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/harness-memory-governance.md" target="_blank" rel="noopener noreferrer">accumulated organizational behavior</a>. Proprietary harnesses trap memory server-side with no export path. Open harnesses are the governance solution.</p></div><button type="button" aria-label="Learn more about The Anchor: Memory as Harness Lock-In Infrastructure" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mt-4 text-center"><a role="button" tabindex="0" href="https://github.com/EndogenAI/dogma" target="_blank" rel="noopener noreferrer" aria-label="Explore EndogenAI on GitHub" class="fs-5 fw-medium btn btn-link">View on GitHub ↗</a></div></div></div></section></div></div><div class="getStartedRow pt-5 pb-5 row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="product-next-steps endogenai"><h3 class="w-100">Get Started</h3><div class="row"><div class="mt-4 mt-md-0 col"><p>Interested in implementing EndogenAI for your organization? Schedule a consulting discovery call to discuss how we can support your implementation.</p><a role="button" tabindex="0" href="https://calendly.com/accessit3ch/30min" target="_blank" rel="noopener noreferrer" aria-label="Schedule Consult (opens in new tab)" data-testid="calendly-button" class="mb-4 w-100 btn btn-primary">Schedule Consult</a></div><div class="mt-4 mt-md-0 col"><p>Have questions about the methodology? Send us a message and we&#x27;ll help you find the right starting point.</p><button type="button" data-testid="endogenai-hub-message-btn" class="w-100 btn btn-primary">Ask a Question</button></div></div></section></div></div><div class="footer-row row"><div class="col"><footer class="bg-dark text-white pt-5 text-start" aria-label="Footer"><div class="container-fluid"><div class="g-4 row"><div class="col-md-8 col-12 offset-md-2"><div class="row"><div class="col-md-6 col-12"><a title="AccessiTech LLC" class="text-decoration-none d-block p-0" href="/"><h3 class="logo-container fs-1 mb-0">AccessiTech LLC<!-- --> </h3></a><p aria-label="Reporting an Issue" class="mt-4">Report bugs, request features, and start collaborating via <a href="https://github.com/AccessiTech/AccessiTech/issues" target="_blank" rel="noopener noreferrer" title="GitHub Issues" class="text-white">GitHub Issues</a>!</p></div><div class="col-md-3 col-12"><h3 class="mb-4">Reach Out!</h3><ul aria-label="Contact List" class="list-unstyled text-start p-0"><li class="mb-3"><a href="https://www.fiverr.com/accessitech" target="_blank" rel="noopener noreferrer" title="Fiverr at accessiTech" class="text-white">Fiverr at accessiTech</a></li><li class="mb-3"><a href="https://www.linkedin.com/company/accessitech/" target="_blank" rel="noopener noreferrer" title="LinkedIn at AccessiTech LLC" class="text-white">LinkedIn at AccessiTech LLC</a></li><li class="mb-3"><a href="https://www.reddit.com/user/accessitech" target="_blank" rel="noopener noreferrer" title="Reddit at u/accessiTech" class="text-white">Reddit at u/accessiTech</a></li><li class="mb-3"><a href="https://twitter.com/accessiT3ch" target="_blank" rel="noopener noreferrer" title="Twitter at accessiT3ch" class="text-white">Twitter at accessiT3ch</a></li></ul></div><div class="col-md-3 col-12"><h3 class="mb-4">Disclosures</h3><ul aria-label="Disclosures" class="list-unstyled p-0"><li class="mb-3"><a title="Accessibility" class="text-white" href="/disclosures/accessibility">Accessibility</a></li><li class="mb-3"><a title="Advertising" class="text-white" href="/disclosures/ads">Advertising</a></li><li class="mb-3"><a title="Affiliate Links" class="text-white" href="/disclosures/affiliate-links">Affiliate Links</a></li><li class="mb-3"><a title="Code of Conduct" class="text-white" href="/disclosures/code-of-conduct">Code of Conduct</a></li><li class="mb-3"><a title="Contributing" class="text-white" href="/disclosures/contributing">Contributing</a></li><li class="mb-3"><a title="Sponsored Content" class="text-white" href="/disclosures/sponsored-content">Sponsored Content</a></li></ul></div></div></div></div><p aria-label="Copyright" c     <div id="root"><div aria-label="App Root" class="App container-fluid"><header class="main-header products" aria-label="Header"><a class="skip-link" href="#main">Skip to main content</a><a title="AccessiTech LLC" class="logo-link" href="/"><h1 class="logo-container" style="background-image:url(&#x27;/assets/images/TypeLogo_White_HC.svg&#x27;)">AccessiTech LLC</h1></a><nav class="header-nav" aria-label="Main navigation"><ul><li><a class="" href="/about">About</a></li><li class="nav-dropdown"><a class="" href="/services">Services</a><ul class="dropdown-menu" aria-label="Services menu"><li><a class="" href="/services/consulting">Consulting</a></li><li class="dropdown-sub-item"><a class="" href="/services/consulting/asaaps">ASaaPs</a></li><li class="dropdown-sub-item"><a class="" href="/services/consulting/ai-integration">AI Integration</a></li><li class="dropdown-sub-item"><a class="" href="/services/consulting/qa">QA</a></li><li><a class="" href="/services/mentorship">Mentorship</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/cccs">Courses &amp; Content</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/coaching">Coaching</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/openclassrooms">OpenClassrooms</a></li><li class="dropdown-sub-item"><a class="" href="/services/mentorship/sotc">SOTC</a></li></ul></li><li class="nav-dropdown"><a class="active" href="/products">Products</a><ul class="dropdown-menu" aria-label="Products menu"><li class="dropdown-sub-item"><a class="" href="/products/wcag-series">WCAG Series</a></li><li class="dropdown-sub-item"><a class="active" href="/products/endogenai">EndogenAI</a></li><li class="dropdown-sub-item"><a class="" href="/products/oss-asaaps">OSS &amp; ASaaPs</a></li><li class="dropdown-sub-item"><a class="" href="/products/cccs">Curriculum &amp; Content</a></li></ul></li><li><a class="" href="/wcag">Learn</a></li><li><a class="" href="/blog">Blog</a></li><li><a class="" href="/contact">Contact</a></li></ul></nav><div class="a11y-container" aria-label="Accessibility Options"><div class="a11y__settings-container"><button class="a11y__settings-toggle" aria-label="Toggle Accessibility Options"><i class="fa fa-cog"></i></button></div></div></header><div class="breadcrumb-row endogenai-page row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><nav aria-label="breadcrumb" class="breadcrumb-container"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/">Home</a></li><li class="breadcrumb-item"><a href="/products">Products</a></li><li class="breadcrumb-item active" aria-current="page">EndogenAI</li></ol></nav></div></div><div class="content-row endogenai-page hero-row pb-2 row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-hero mb-5 mt-2"><h1 class="mb-3">EndogenAI</h1><div class="hero-tagline"><p>The accountability gap is growing...AI systems are built without genuine consideration for the people who depend on them. <strong>EndogenAI fixes that</strong> — an open-source methodology for embedding governance into every layer of your AI workflows.</p></div></section></div></div><div class="content-row endogenai-page mt-5 row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-problem text-start mb-5"><h2 class="mb-4">The Problem</h2><p>Recent governance reports expose the same structural risks: AI systems launched without accountability mechanisms, platform dependencies that trap organizations, and decision-making processes that exclude the people most affected. A less visible risk runs underneath all of them: most AI teams don&#x27;t realize their agent harness — the scaffolding between their LLM and their tools, data, and memory — is the stickiest lock-in vector of all. Here&#x27;s what the research shows:</p><div class="problem-cards mt-5 row"><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">UK CMA: AI Agent Autonomy Failures</div><div class="card-short-body flex-grow-1"><p>The UK CMA&#x27;s 2026 watchdog report documents systematic AI agent failures: manipulation, unintended escalation, and loss of human oversight. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/ai-autonomy-governance.md#" target="_blank" rel="noopener noreferrer">See the full analysis</a> — these aren&#x27;t theoretical risks.</p></div><button type="button" aria-label="Learn more about UK CMA: AI Agent Autonomy Failures" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">Platform Lock-In: Vendor Volatility</div><div class="card-short-body flex-grow-1"><p>Meta&#x27;s acquisition of Moltbook shows how organizations can lose operational control overnight when vendor policies shift without warning. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/ai-platform-lock-in-risks.md#" target="_blank" rel="noopener noreferrer">Platform lock-in research</a> documents the repeating pattern.</p></div><button type="button" aria-label="Learn more about Platform Lock-In: Vendor Volatility" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">OWASP LLM Top 10: Security Blindness</div><div class="card-short-body flex-grow-1"><p>Seven of the OWASP LLM Top 10 apply to agentic workflows — three at High severity. Most organizations don&#x27;t know they&#x27;re exposed. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/owasp-llm-threat-model.md#" target="_blank" rel="noopener noreferrer">Full threat model analysis</a> — governance closes these gaps.</p></div><button type="button" aria-label="Learn more about OWASP LLM Top 10: Security Blindness" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div><div class="col-md-6 col-12"><div class="mb-3 h-100 card"><div class="d-flex flex-column card-body"><div class="fw-bold fs-5 card-title h5">Harness Lock-In: Memory Loss</div><div class="card-short-body flex-grow-1"><p>Deleting a proprietary AI agent loses months of learned preferences — permanently. Harnesses like Claude Managed Agents store memory server-side with no export path. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/harness-memory-governance.md" target="_blank" rel="noopener noreferrer">Full analysis</a> — memory lock-in is not recoverable.</p></div><button type="button" aria-label="Learn more about Harness Lock-In: Memory Loss" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div></div></div></section><section class="endogenai-what text-start mb-5"><h2 class="mb-4">What EndogenAI is</h2><div class="brand-relationship mb-4"><p>AccessiTech built EndogenAI as the governance layer for organizations closing the accountability gap with AI systems. The methodology emerges from three years of accessibility-first consulting work: seeing how systems fail when they&#x27;re built without genuine consideration for the people who depend on them, and discovering that the same structural blindness appears in AI governance. Disability justice principles — centering the expertise of disabled people in redesign — are directly applicable to AI accountability. The people most excluded from a system are the people best positioned to fix it. That insight is the foundation of EndogenAI. We use it in every consulting engagement, and we&#x27;re open-sourcing it so organizations can apply the same methodology independently.</p></div><div class="what-subsections row"><div class="mb-4 col-md-6 col-12"><h3>Three Core Axioms</h3><ul>
<li><strong><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#1-endogenous-first" target="_blank" rel="noopener noreferrer">Endogenous-First</a></strong> — read your system&#x27;s own encoded knowledge before acting</li>
<li><strong><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#2-algorithms-before-tokens" target="_blank" rel="noopener noreferrer">Algorithms Before Tokens</a></strong> — prefer deterministic, scripted solutions over interactive generation</li>
<li><strong><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#3-local-compute-first" target="_blank" rel="noopener noreferrer">Local Compute-First</a></strong> — run enforcement locally, at the commit boundary, not delegated to cloud CI</li>
</ul>
<p>Every layer of the governance stack implements these three principles.</p></div><div class="mb-4 col-md-6 col-12"><h3>The Open-Source Model</h3><p>This is the same model Red Hat used to open-source enterprise infrastructure: free methodology, paid implementation support. You own every file, audit every layer, and build organizational capabilities that don&#x27;t depend on any vendor. <a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#" target="_blank" rel="noopener noreferrer">Read the full Endogenic Development Manifesto</a> — the constitutional foundation for everything EndogenAI does. AccessiTech offers implementation consulting for organizations that want hands-on help embedding the stack.</p></div></div></section><section class="endogenai-products text-start"><h2 class="mb-4">What is dogma &amp; DogmaMCP?</h2><div class="mb-4"><p><strong>dogma</strong> is the governance substrate you own and version-control; <strong>DogmaMCP</strong> makes that substrate programmatically accessible to AI agents via the Model Context Protocol; <strong>EndogenAI</strong> is the consulting methodology for embedding both into your organization&#x27;s workflows.</p></div><div class="products-cards mb-5 mt-5 row"><div class="col-md-6 col-12"><h3>dogma</h3><div class="card-short-body flex-grow-1"><p>The governance corpus you fork and extend: MANIFESTO.md axioms, agent roles, scripts, research synthesis. Every organization using EndogenAI <a href="https://github.com/EndogenAI/dogma" target="_blank" rel="noopener noreferrer">reads from dogma</a> and adapts it for their context — governance lives in your git repository, not vendor dashboards.</p></div><button type="button" aria-label="Learn more about dogma" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div><div class="col-md-6 col-12"><h3>DogmaMCP</h3><div class="card-short-body flex-grow-1"><p>MCP server exposing dogma tools to AI agents: validators for agent files, scratchpad state checks, scaffolding templates. Runs locally, integrates with VS Code Copilot and Claude Desktop, enforces <a href="https://github.com/EndogenAI/dogma/tree/main/mcp_server" target="_blank" rel="noopener noreferrer">governance programmatically</a>. It&#x27;s the bridge between encoded substrate and AI workflow.</p></div><button type="button" aria-label="Learn more about DogmaMCP" class="mt-2 align-self-start btn btn-outline-secondary btn-sm">Learn more</button></div></div><h3>The Governance Stack</h3><p>EndogenAI governance is encoded as a five-layer stack — each layer a concrete artifact you own, audit, and extend.</p><div class="governance-stack-cards mb-5 row"><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#the-three-core-axioms" target="_blank" rel="noopener noreferrer">MANIFESTO.md</a></h4><p class="mb-0">Your organization&#x27;s foundational values and operational constraints — the constitutional layer every other artifact inherits from.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#guiding-constraints" target="_blank" rel="noopener noreferrer">AGENTS.md</a></h4><p class="mb-0">Agent fleet conventions, decision gates, commit discipline, and phase sequences — principles translated into enforceable operational rules.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/.github/agents/README.md#agent-fleet-catalog" target="_blank" rel="noopener noreferrer">Agent Roles (.agent.md files)</a></h4><p class="mb-0">Specialized agents with explicit tool restrictions, defined posture, and handoff patterns — no agent gets a general-purpose toolkit.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/.github/skills/" target="_blank" rel="noopener noreferrer">Agent Skills (SKILL.md files)</a></h4><p class="mb-0">Domain-specific workflows packaged so any agent can invoke them — the &quot;how to&quot; layer for procedures used by more than one role.</p></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 card"><div class="card-body"><h4 class="card-title"><a href="https://github.com/EndogenAI/dogma/blob/main/scripts/README.md#directory-layout" target="_blank" rel="noopener noreferrer">Governance Scripts</a></h4><p class="mb-0">Deterministic validation, linting, and enforcement that run at every commit and push boundary — scripted governance is auditable and repeatable.</p></div></div></div></div></section></div></div><div class="how-it-works-row row"><div class="pt-5 pb-3 col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-how text-start mb-5"><h2 class="mb-4 text-center text-dark fw-bold">How All It Works</h2><div class="encoding-cards row"><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">1<!-- -->.</span> <!-- -->Foundational Axioms (MANIFESTO.md)</h3><div class="card-short-body flex-grow-1"><p>Your organization&#x27;s foundational values and axioms define what kind of system you are. EndogenAI uses three: Endogenous-First, Algorithms-Before-Tokens, Local-Compute-First. <a href="https://github.com/EndogenAI/dogma/blob/main/MANIFESTO.md#the-three-core-axioms" target="_blank" rel="noopener noreferrer">Read the full MANIFESTO</a> — these axioms govern every layer below.</p></div><button type="button" aria-label="Learn more about Foundational Axioms (MANIFESTO.md)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">2<!-- -->.</span> <!-- -->Operational Constraints (AGENTS.md)</h3><div class="card-short-body flex-grow-1"><p>Translate high-level axioms into operational rules the entire agent fleet follows: session gates, commit discipline, file-write guardrails, phase sequences. <a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#guiding-constraints" target="_blank" rel="noopener noreferrer">AGENTS.md</a> is where principles meet practice — the constitutional enforcement layer.</p></div><button type="button" aria-label="Learn more about Operational Constraints (AGENTS.md)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">3<!-- -->.</span> <!-- -->Agent Roles (.agent.md files)</h3><div class="card-short-body flex-grow-1"><p>Specialized agents with minimal, role-specific tool sets. Each has explicit posture (readonly, creator, full), handoff patterns, and endogenous sources. No general-purpose toolkits. <a href="https://github.com/EndogenAI/dogma/blob/main/.github/agents/README.md" target="_blank" rel="noopener noreferrer">Agent fleet catalog</a> shows how role definitions instantiate MANIFESTO axioms.</p></div><button type="button" aria-label="Learn more about Agent Roles (.agent.md files)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">4<!-- -->.</span> <!-- -->Reusable Skills (SKILL.md files)</h3><div class="card-short-body flex-grow-1"><p>Package domain-specific workflows so multiple agents can invoke them. When a procedure is used twice, the third time becomes a skill. <a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#agent-skills" target="_blank" rel="noopener noreferrer">Skills library</a> is the &quot;how to&quot; layer — decision gates, validation checklists, repeatable techniques.</p></div><button type="button" aria-label="Learn more about Reusable Skills (SKILL.md files)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">5<!-- -->.</span> <!-- -->Deterministic Governance (Scripts)</h3><div class="card-short-body flex-grow-1"><p>Deterministic validation and enforcement encoded as scripts that run on every commit (pre-commit hooks), push (pre-push tests), and in CI. <a href="https://github.com/EndogenAI/dogma/blob/main/scripts/README.md" target="_blank" rel="noopener noreferrer">Scripts catalog</a> — scripted governance is auditable, repeatable, and more reliable than manual review gates.</p></div><button type="button" aria-label="Learn more about Deterministic Governance (Scripts)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">6<!-- -->.</span> <!-- -->Lossless Content Space (CScratchpad)</h3><div class="card-short-body flex-grow-1"><p>Persistent, structured storage that retains session state, governance context, and agent findings across all AI conversation boundaries. When context windows compact, governance context survives. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/guides/session-management.md#scratchpad-governance" target="_blank" rel="noopener noreferrer">Session governance protocol</a> makes organizational memory durable beyond token limits.</p></div><button type="button" aria-label="Learn more about Lossless Content Space (CScratchpad)" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div><div class="mb-4 col-md-6 col-12"><div class="encoding-step-card h-100 card"><div class="d-flex flex-column p-4 card-body"><h3 class="card-title"><span class="step-number">7<!-- -->.</span> <!-- -->Runtime Validation &amp; Monitoring</h3><div class="card-short-body flex-grow-1"><p>Pre-commit hooks and CI gates enforce all upstream constraints at every boundary. Commit violates AGENTS.md? Pre-commit rejects before push. CI finds violations? PR cannot merge. <a href="https://github.com/EndogenAI/dogma/blob/main/AGENTS.md#guardrails" target="_blank" rel="noopener noreferrer">Guardrails reference</a> — governance is checked continuously, not retrospectively.</p></div><button type="button" aria-label="Learn more about Runtime Validation &amp; Monitoring" class="mt-2 align-self-end btn btn-primary btn-sm">Learn more</button></div></div></div></div></section></div></div><div class="research-section row"><div class="text-start col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="endogenai-research py-5"><h2 class="mb-4 text-center">What the Research Says</h2><div class="mb-5 research-intro"><p>The methodology is only as strong as its empirical foundation. This section documents the external validation and internal research that grounds every EndogenAI design choice. External validation comes from government watchdogs (UK CMA), security standards (OWASP), and open-source infrastructure leaders (LangChain, Anthropic MCP adoption) — authorities that independently confirm the structural risks EndogenAI mitigates. Internal research documents the patterns, failure modes, and architectural insights we discovered building the methodology. Together, these sources prove EndogenAI is not aspirational governance — it is tested, validated, and grounded in both industry practice and independent oversight.</p></div><div class="research-external"><h3 class="mb-3 mt-5">What External Authorities Say</h3><div class="research-cards mt-3 row"><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">LangChain: Your Harness, Your Memory</h4><div class="card-short-body flex-grow-1"><p>Harness infrastructure is permanent — memory is the most durable lock-in vector. Organizations that don&#x27;t own their harness <a href="https://www.langchain.com/blog/your-harness-your-memory" target="_blank" rel="noopener noreferrer">cede accumulated behavioral context</a> to the vendor, with no path to reconstruct it. Memory lives with your harness.</p></div><button type="button" aria-label="Learn more about LangChain: Your Harness, Your Memory" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Datadog: Harness-First Agents</h4><div class="card-short-body flex-grow-1"><p>Treating the harness as primary infrastructure — not a convenience layer — is the precondition for <a href="https://www.datadoghq.com/blog/ai/harness-first-agents/" target="_blank" rel="noopener noreferrer">reliable, auditable agentic systems</a> at production scale. Memory, tool routing, and access control belong in the harness, not bolted on afterward.</p></div><button type="button" aria-label="Learn more about Datadog: Harness-First Agents" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">OWASP LLM Top 10</h4><div class="card-short-body flex-grow-1"><p>Seven of ten highest-severity LLM risks apply directly to agentic workflows. Harness-level governance — not application patching — is the <a href="https://owasp.org/www-project-top-10-for-large-language-model-applications/" target="_blank" rel="noopener noreferrer">appropriate mitigation layer</a> for all seven. Prompt injection, excessive agency, and information leakage require architectural defense.</p></div><button type="button" aria-label="Learn more about OWASP LLM Top 10" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Anthropic MCP Standard Adoption</h4><div class="card-short-body flex-grow-1"><p>MCP is rapidly becoming the cross-vendor standard for tool-calling across Claude Desktop, VS Code, Cursor, and third-party servers. <a href="https://www.anthropic.com/news/model-context-protocol" target="_blank" rel="noopener noreferrer">Open harness architecture</a> is the durable bet — validating governance-as-substrate rather than governance-as-wrapper.</p></div><button type="button" aria-label="Learn more about Anthropic MCP Standard Adoption" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">UK CMA AI Autonomy Report</h4><div class="card-short-body flex-grow-1"><p>Watchdog findings on agent autonomy failures validate EndogenAI&#x27;s Minimal-Posture principle: limit tool scope, require explicit phase gates, treat every escalation as <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/ai-autonomy-governance.md" target="_blank" rel="noopener noreferrer">a human decision boundary</a>. Autonomy without constraints produces manipulation and unintended escalation.</p></div><button type="button" aria-label="Learn more about UK CMA AI Autonomy Report" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">NIST AI Risk Management Framework (AI RMF 1.0)</h4><div class="card-short-body flex-grow-1"><p>NIST&#x27;s federal AI governance standard validates <a href="https://www.nist.gov/itl/ai-risk-management-framework" target="_blank" rel="noopener noreferrer">values-first architecture</a>: transparency, human oversight, and documented accountability must be structural, not aspirational. EndogenAI operationalizes all three as substrate layers.</p></div><button type="button" aria-label="Learn more about NIST AI Risk Management Framework (AI RMF 1.0)" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div></div></div><div class="research-internal mt-4"><h3 class="mb-3 mt-5">Our Research</h3><div class="research-cards mt-3 row"><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Endogenic Design Patterns for AI Systems</h4><div class="card-short-body flex-grow-1"><p>Biological scaffolding metaphors for AI governance. Organizations encoding knowledge persistently show <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/methodology/endogenic-design-paper.md" target="_blank" rel="noopener noreferrer">40–60% reduction in incident recovery time</a> compared to ad-hoc approaches — the substrate grows stronger with each session.</p></div><button type="button" aria-label="Learn more about Endogenic Design Patterns for AI Systems" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Values Encoding Fidelity and Agent Fleet Maturity</h4><div class="card-short-body flex-grow-1"><p>How to measure whether your governance actually works: cross-layer validation, encoding fidelity tests, L0–L3 maturity model. <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/methodology/values-encoding.md" target="_blank" rel="noopener noreferrer">Values encoding research</a> defines the diagnostic framework — from tacit knowledge to organizational policy.</p></div><button type="button" aria-label="Learn more about Values Encoding Fidelity and Agent Fleet Maturity" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">Bubble Clusters and Substrate Fragmentation</h4><div class="card-short-body flex-grow-1"><p>Why AI workflows built with disconnected agents fail at governance boundaries. Unified substrate and version control <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/neuroscience/bubble-clusters-substrate.md" target="_blank" rel="noopener noreferrer">prevent &quot;bubble&quot; formation</a> where agents silently violate constraints — fragmented state is the enemy of coherence.</p></div><button type="button" aria-label="Learn more about Bubble Clusters and Substrate Fragmentation" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mb-3 col-md-6 col-12"><div class="h-100 research-card card"><div class="d-flex flex-column card-body"><h4 class="mb-2 card-title">The Anchor: Memory as Harness Lock-In Infrastructure</h4><div class="card-short-body flex-grow-1"><p>Memory is the structural anchor for vendor lock-in — more durable than model switching because it embeds <a href="https://github.com/EndogenAI/dogma/blob/main/docs/research/harness-memory-governance.md" target="_blank" rel="noopener noreferrer">accumulated organizational behavior</a>. Proprietary harnesses trap memory server-side with no export path. Open harnesses are the governance solution.</p></div><button type="button" aria-label="Learn more about The Anchor: Memory as Harness Lock-In Infrastructure" class="mt-2 align-self-end btn btn-outline-light btn-sm">Learn more</button></div></div></div><div class="mt-4 text-center"><a role="button" tabindex="0" href="https://github.com/EndogenAI/dogma" target="_blank" rel="noopener noreferrer" aria-label="Explore EndogenAI on GitHub" class="fs-5 fw-medium btn btn-link">View on GitHub ↗</a></div></div></div></section></div></div><div class="getStartedRow pt-5 pb-5 row"><div class="col-lg-8 col-sm-10 col-12 offset-lg-2 offset-sm-1"><section class="product-next-steps endogenai"><h3 class="w-100">Get Started</h3><div class="row"><div class="mt-4 mt-md-0 col"><p>Interested in implementing EndogenAI for your organization? Schedule a consulting discovery call to discuss how we can support your implementation.</p><a role="button" tabindex="0" href="https://calendly.com/accessit3ch/30min" target="_blank" rel="noopener noreferrer" aria-label="Schedule Consult (opens in new tab)" data-testid="calendly-button" class="mb-4 w-100 btn btn-primary">Schedule Consult</a></div><div class="mt-4 mt-md-0 col"><p>Have questions about the methodology? Send us a message and we&#x27;ll help you find the right starting point.</p><button type="button" data-testid="endogenai-hub-message-btn" class="w-100 btn btn-primary">Ask a Question</button></div></div></section></div></div><div class="footer-row row"><div class="col"><footer class="bg-dark text-white pt-5 text-start" aria-label="Footer"><div class="container-fluid"><div class="g-4 row"><div class="col-md-8 col-12 offset-md-2"><div class="row"><div class="col-md-6 col-12"><a title="AccessiTech LLC" class="text-decoration-none d-block p-0" href="/"><h3 class="logo-container fs-1 mb-0">AccessiTech LLC<!-- --> </h3></a><p aria-label="Reporting an Issue" class="mt-4">Report bugs, request features, and start collaborating via <a href="https://github.com/AccessiTech/AccessiTech/issues" target="_blank" rel="noopener noreferrer" title="GitHub Issues" class="text-white">GitHub Issues</a>!</p></div><div class="col-md-3 col-12"><h3 class="mb-4">Reach Out!</h3><ul aria-label="Contact List" class="list-unstyled text-start p-0"><li class="mb-3"><a href="https://www.fiverr.com/accessitech" target="_blank" rel="noopener noreferrer" title="Fiverr at accessiTech" class="text-white">Fiverr at accessiTech</a></li><li class="mb-3"><a href="https://www.linkedin.com/company/accessitech/" target="_blank" rel="noopener noreferrer" title="LinkedIn at AccessiTech LLC" class="text-white">LinkedIn at AccessiTech LLC</a></li><li class="mb-3"><a href="https://www.reddit.com/user/accessitech" target="_blank" rel="noopener noreferrer" title="Reddit at u/accessiTech" class="text-white">Reddit at u/accessiTech</a></li><li class="mb-3"><a href="https://twitter.com/accessiT3ch" target="_blank" rel="noopener noreferrer" title="Twitter at accessiT3ch" class="text-white">Twitter at accessiT3ch</a></li></ul></div><div class="col-md-3 col-12"><h3 class="mb-4">Disclosures</h3><ul aria-label="Disclosures" class="list-unstyled p-0"><li class="mb-3"><a title="Accessibility" class="text-white" href="/disclosures/accessibility">Accessibility</a></li><li class="mb-3"><a title="Advertising" class="text-white" href="/disclosures/ads">Advertising</a></li><li class="mb-3"><a title="Affiliate Links" class="text-white" href="/disclosures/affiliate-links">Affiliate Links</a></li><li class="mb-3"><a title="Code of Conduct" class="text-white" href="/disclosures/code-of-conduct">Code of Conduct</a></li><li class="mb-3"><a title="Contributing" class="text-white" href="/disclosures/contributing">Contributing</a></li><li class="mb-3"><a title="Sponsored Content" class="text-white" href="/disclosures/sponsored-content">Sponsored Content</a></li></ul></div></div></div></div><p aria-label="Copyright" c
